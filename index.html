<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านกรีกโยเกิร์ต 39 บาท</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #0056b3; --bg-color: #f8f9fa; --card-bg: #ffffff; --accent-color: #ffc107; --text-color: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; min-height: 100vh; background-color: var(--card-bg); box-shadow: 0 0 15px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* สไตล์สำหรับโลโก้และการจัดแต่งรูป */
        .logo-container { text-align: center; margin: 10px 0; }
        .logo-img { max-width: 120px; height: auto; border-radius: 50%; }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 10px; font-size: 24px;}
        
        .price-tag { text-align: center; background-color: var(--accent-color); color: #000; padding: 10px; border-radius: 10px; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .status-badge { text-align: center; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .status-badge.available { background-color: #e8f5e9; color: #2e7d32; border: 2px solid #4caf50; }
        .status-badge.sold-out { background-color: #ffebee; color: #c62828; border: 2px solid #ef5350; }
        
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; font-size: 18px; font-weight: 600; color: var(--primary-color); }
        .btn-main { display: block; width: 100%; padding: 15px; background-color: var(--primary-color); color: white; text-align: center; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-main:disabled { background-color: #cccccc; cursor: not-allowed; }
        .btn-back { background: none; border: none; color: var(--primary-color); font-size: 16px; cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 10px; }
        .checkbox-group { background: var(--bg-color); padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .checkbox-label { display: flex; align-items: center; margin-bottom: 10px; font-size: 16px; cursor: pointer; }
        .checkbox-label input { width: 20px; height: 20px; margin-right: 10px; accent-color: var(--primary-color); }
        
        input[type="text"], input[type="date"], input[type="number"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; font-family: 'Prompt', sans-serif; }
        textarea { resize: none; height: 80px; }
        .divider { height: 1px; background: #ddd; margin: 15px 0; }
        .total-price-box { background-color: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 10px; text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 20px; border: 2px dashed #4caf50; }
    </style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
    <div style="font-size: 30px; margin-bottom: 10px;">⏳</div>
    <div>กำลังโหลดข้อมูลสถานะร้าน...</div>
</div>

<div class="container">
    <div id="home-page" class="page">
        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="logo-img">
        </div>

        <h1>🍯 ร้านกรีกโยเกิร์ตโฮมเมด</h1>
        <div class="price-tag">ราคาเพียง 39 บาท!</div>

        <div id="stock-status" class="status-badge available">
            ✅ มีสินค้าพร้อมรับออเดอร์
        </div>

        <img src="product.jpg" alt="Greek Yogurt" style="width: 100%; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">

        <button id="main-order-btn" class="btn-main" onclick="goToOrder()" disabled>กำลังโหลดสถานะร้าน...</button>
    </div>

    <div id="order-page" class="page">
        <button class="btn-back" onclick="goToHome()">❮ กลับหน้าหลัก</button>
        <h1>ฟอร์มสั่งซื้อสินค้า</h1>
        
        <form id="order-form" onsubmit="submitOrder(event)">
            
            <div class="form-group">
                <label>ชื่อลูกค้า (ชื่อเล่น / ชื่อที่แม่ค้าจำได้ 💖)</label>
                <input type="text" id="customer-name" placeholder="เช่น น้องเหมียวตึก 3, พี่สมชาย..." required>
            </div>

            <div class="form-group">
                <label>ระดับความหนึบที่ชอบ</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="radio" name="texture" value="หนึบ" required checked> เนื้อแน่นกำลังดี (สูตรมาตรฐานของร้าน)
                    </label>
                    <label class="checkbox-label">
                        <input type="radio" name="texture" value="นุ่มละมุน"> เนื้อครีมมี่เนียนนุ่ม (ทานง่าย คล่องคอ)
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>เลือกท็อปปิ้ง (สูงสุด 3 อย่าง)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-all" onchange="toggleAll()" checked> <b>ใส่ทุกอย่าง (39 บาท)</b>
                    </label>
                    <div class="divider"></div>
                    <label class="checkbox-label">
                        <input type="checkbox" class="topping" value="แครกเกอร์" onchange="checkIndividual()" checked> แครกเกอร์
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="topping" value="น้ำผึ้ง" onchange="checkIndividual()" checked> น้ำผึ้ง
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="topping" value="กล้วย" onchange="checkIndividual()" checked> กล้วย
                    </label>
                </div>
                <small style="color: #666; margin-top: 5px; display: block;">* เลือก 2 อย่าง 35.- / เลือก 1 อย่างหรือไม่ใส่เลย 30.-</small>
            </div>

            <div class="form-group">
                <label>จำนวนที่ต้องการสั่ง (ถ้วย)</label>
                <input type="number" id="quantity" value="1" min="1" oninput="calculatePrice(); updateDeliveryRounds();" required>
            </div>

            <div class="total-price-box">
                ยอดรวมต้องชำระ: <span id="total-price-display">39</span> บาท
            </div>

            <div class="form-group">
                <label>วันที่ต้องการรับสินค้า</label>
                <input type="date" id="delivery-date" onchange="updateDeliveryRounds()" required>
            </div>

            <div class="form-group">
                <label>เลือกรอบส่ง (เปิด-ปิด ตามที่แม่ค้ากำหนด)</label>
                <select id="delivery-round" required>
                    <option value="" disabled selected>กรุณาเลือกวันที่ก่อนค่ะ...</option>
                </select>
            </div>

            <div class="form-group">
                <label>สถานที่จัดส่ง / เบอร์ติดต่อ</label>
                <textarea id="address" placeholder="กรอกที่อยู่จัดส่ง จุดสังเกต และเบอร์โทรศัพท์..." required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="btn-main">ยืนยันการสั่งซื้อ</button>
        </form>
    </div>
</div>

<script>
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbzyiRJS07kEjIXph8hTEBwYupKibmkF9Fe8ltVMhpwvsenxkiRBrAoufjyREc1QqFddow/exec';

    let isStockAvailable = true; 
    let shopSchedule = {}; 

    function initApp() {
        const loadingScreen = document.getElementById('loading-screen');
        const homePage = document.getElementById('home-page');
        const statusBox = document.getElementById('stock-status');
        const mainOrderBtn = document.getElementById('main-order-btn');

        fetch(scriptUrl)
        .then(response => response.json())
        .then(config => {
            isStockAvailable = config.isStockAvailable;
            shopSchedule = config.schedule; 

            if (!isStockAvailable) {
                statusBox.className = 'status-badge sold-out';
                statusBox.innerHTML = '❌ สินค้าหมดชั่วคราว (รอรอบหน้านะคะ)';
                mainOrderBtn.innerText = 'ปิดรับออเดอร์';
            } else {
                statusBox.className = 'status-badge available';
                statusBox.innerHTML = '✅ มีสินค้าพร้อมรับออเดอร์';
                mainOrderBtn.innerText = 'สั่งเลย 😋';
                mainOrderBtn.disabled = false; 
            }

            loadingScreen.style.display = 'none';
            homePage.classList.add('active');
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ ไม่สามารถโหลดข้อมูลร้านค้าได้');
            loadingScreen.innerHTML = '⚠️ เกิดข้อผิดพลาด';
        });
    }

    initApp();

    function updateDeliveryRounds() {
        const selectedDate = document.getElementById('delivery-date').value; 
        const qtyWanted = parseInt(document.getElementById('quantity').value) || 1;
        const roundSelect = document.getElementById('delivery-round');
        const submitBtn = document.getElementById('submit-btn');
        
        roundSelect.innerHTML = '<option value="" disabled selected>กำลังเช็คโควตา...</option>';
        submitBtn.disabled = false;

        if (!selectedDate) return;

        const dayConfig = shopSchedule[selectedDate];

        if (dayConfig) {
            if (dayConfig.isFull) {
                roundSelect.innerHTML = '<option value="" disabled selected>❌ สินค้าหมดชั่วคราว</option>';
                submitBtn.disabled = true;
            } else if (dayConfig.quota > 0 && (dayConfig.booked + qtyWanted) > dayConfig.quota) {
                const remaining = dayConfig.quota - dayConfig.booked;
                roundSelect.innerHTML = `<option value="" disabled selected>❌ รับได้อีกแค่ ${remaining} ถ้วยค่ะ</option>`;
                submitBtn.disabled = true;
            } else {
                roundSelect.innerHTML = '<option value="" disabled selected>เลือกรอบเวลา...</option>';
                let hasRound = false;
                if (dayConfig.morning) { roundSelect.innerHTML += '<option value="รอบเช้า (09:00)">รอบเช้า (09:00)</option>'; hasRound = true; }
                if (dayConfig.afternoon) { roundSelect.innerHTML += '<option value="รอบบ่าย (13:00)">รอบบ่าย (13:00)</option>'; hasRound = true; }

                if (!hasRound) {
                    roundSelect.innerHTML = '<option value="" disabled selected>❌ วันนี้ปิดรับออเดอร์ค่ะ</option>';
                    submitBtn.disabled = true;
                }
            }
        } else {
            roundSelect.innerHTML = '<option value="" disabled selected>❌ ยังไม่เปิดคิวสำหรับวันนี้ค่ะ</option>';
            submitBtn.disabled = true;
        }
    }

    function goToOrder() {
        if (!isStockAvailable) return;
        document.getElementById('home-page').classList.remove('active');
        document.getElementById('order-page').classList.add('active');
        window.scrollTo(0, 0); calculatePrice(); 
    }
    
    function goToHome() {
        document.getElementById('order-page').classList.remove('active');
        document.getElementById('home-page').classList.add('active');
        window.scrollTo(0, 0);
    }
    
    const checkAllBox = document.getElementById('check-all');
    const toppingBoxes = document.querySelectorAll('.topping');
    function toggleAll() { toppingBoxes.forEach(box => box.checked = checkAllBox.checked); calculatePrice(); }
    function checkIndividual() { checkAllBox.checked = Array.from(toppingBoxes).every(box => box.checked); calculatePrice(); }
    
    function calculatePrice() {
        let checkedCount = 0; toppingBoxes.forEach(box => { if(box.checked) checkedCount++; });
        let pricePerCup = (checkedCount === 3) ? 39 : (checkedCount === 2) ? 35 : 30;
        let quantity = parseInt(document.getElementById('quantity').value);
        if (isNaN(quantity) || quantity < 1) quantity = 1; 
        document.getElementById('total-price-display').innerText = pricePerCup * quantity;
    }

    function submitOrder(event) {
        event.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = '⏳ กำลังส่งออเดอร์...'; submitBtn.disabled = true;

        let selectedToppings = [];
        toppingBoxes.forEach(box => { if(box.checked) selectedToppings.push(box.value); });
        let toppingsText = (selectedToppings.length > 0) ? selectedToppings.join(', ') : 'ไม่ใส่ท็อปปิ้ง';
        let roundSelect = document.getElementById('delivery-round');
        let roundText = roundSelect.options[roundSelect.selectedIndex].text;

        const orderData = {
            customerName: document.getElementById('customer-name').value,
            texture: document.querySelector('input[name="texture"]:checked').value,
            toppings: toppingsText,
            quantity: document.getElementById('quantity').value,
            totalPrice: document.getElementById('total-price-display').innerText,
            deliveryDate: document.getElementById('delivery-date').value,
            deliveryRound: roundText,
            address: document.getElementById('address').value
        };

        fetch(scriptUrl, { method: 'POST', body: JSON.stringify(orderData) })
        .then(response => {
            alert('🎉 สั่งซื้อสำเร็จ! แม่ค้าได้รับออเดอร์แล้วค่ะ');
            location.reload(); 
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ มีข้อผิดพลาด! กรุณาลองใหม่อีกครั้ง');
            submitBtn.innerText = 'ยืนยันการสั่งซื้อ'; submitBtn.disabled = false;
        });
    }
</script>

</body>
</html>
