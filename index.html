<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านกรีกโยเกิร์ต 39 บาท</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0056b3; 
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --accent-color: #ffc107;
            --text-color: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; }

        .container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: var(--card-bg);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { text-align: center; color: var(--primary-color); margin-bottom: 10px; font-size: 24px; }
        .home-content { text-align: center; margin-top: 20px; }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .product-item {
            position: relative; width: 100%; padding-bottom: 100%;
            border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); background-color: #eee;
        }
        .product-item img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-icon { font-size: 40px; text-decoration: none; transition: 0.3s; }
        .line-icon { color: #00c300; }
        .ig-icon { color: #c13584; }
        .btn-order {
            display: inline-block; width: 100%; padding: 15px 30px;
            background-color: #1a53ad; color: white; text-align: center;
            border: none; border-radius: 15px; font-size: 18px; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .btn-order:disabled { background-color: #cccccc; cursor: not-allowed; }
        .logo-footer { text-align: center; margin-top: 30px; padding: 20px; background-color: #f1f8ff; border-radius: 15px; }
        .logo-footer img { max-width: 150px; height: auto; border-radius: 20px; }

        .price-tag { text-align: center; background-color: var(--accent-color); color: #000; padding: 10px; border-radius: 10px; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .status-badge { text-align: center; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .status-badge.available { background-color: #e8f5e9; color: #2e7d32; border: 2px solid #4caf50; }
        .status-badge.sold-out { background-color: #ffebee; color: #c62828; border: 2px solid #ef5350; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 10px; }
        .checkbox-group { background: var(--bg-color); padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .checkbox-label { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .checkbox-label input[type="radio"], .checkbox-label input[type="checkbox"] { width: 20px; height: 20px; margin-right: 10px; flex-shrink: 0; }
        input[type="text"], input[type="date"], input[type="number"], select, textarea, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Prompt'; background-color: white;}
        .total-price-box { background-color: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 10px; text-align: center; font-size: 22px; font-weight: 700; border: 2px dashed #4caf50; margin-bottom: 20px; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .btn-main { display: block; width: 100%; padding: 15px; background-color: #1a53ad; color: white; text-align: center; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
    <div style="font-size: 30px; margin-bottom: 10px;">⏳</div>
    <div>กำลังโหลดข้อมูลสถานะร้าน...</div>
</div>

<div class="container">
    <div id="home-page" class="page">
        <div class="home-content">
            <h1>🍯 ร้านกรีกโยเกิร์ตโฮมเมด</h1>
            <div class="price-tag">เริ่มต้นเพียง 39 บาท!</div>

            <div id="stock-status" class="status-badge available">
                ✅ วันนี้เปิดร้านนะคะ 🍯✨
            </div>

            <div class="product-grid">
                <div class="product-item"><img src="2.jpg" alt="สินค้า 1"></div>
                <div class="product-item"><img src="product.jpg" alt="สินค้า 2"></div>
            </div>

            <div class="social-icons">
                <a href="https://line.me/ti/p/Gvo_Ch9ibR" target="_blank" class="social-icon line-icon"><i class="fab fa-line"></i></a>
                <a href="https://www.instagram.com/sxrmmm_?igsh=aDNqbHdtOXBzc2lm&utm_source=qr" target="_blank" class="social-icon ig-icon"><i class="fab fa-instagram"></i></a>
            </div>

            <button id="main-order-btn" class="btn-order" onclick="goToOrder()" disabled>
                สั่งเลย 😋
            </button>

            <div class="logo-footer">
                <img src="logo.png" alt="Logo">
                <p style="font-size: 14px; color: #666; margin-top: 10px;">ขอบคุณที่อุดหนุนนะคะ 💖</p>
            </div>
        </div>
    </div>

    <div id="order-page" class="page">
        <button type="button" style="border:none; background:none; color:#0056b3; cursor:pointer; font-family:'Prompt'; margin-bottom: 15px;" onclick="goToHome()">❮ กลับหน้าหลัก</button>
        <h1>ฟอร์มสั่งซื้อสินค้า</h1>
        
        <form id="order-form" onsubmit="goToPayment(event)">
            <div class="form-group">
                <label>ชื่อลูกค้า (ชื่อที่แม่ค้าจำได้ 💖)</label>
                <input type="text" id="customer-name" placeholder="ระบุชื่อของคุณ" required>
            </div>

            <div class="form-group">
                <label>เลือกขนาด (Size)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="size" value="39" onchange="calculatePrice()" checked> ไซส์ปกติ (39 บาท)</label>
                    <label class="checkbox-label"><input type="radio" name="size" value="69" onchange="calculatePrice()"> ไซส์พิเศษ จุกๆ (69 บาท)</label>
                </div>
            </div>

           <div class="form-group">
                <label>เลือกท็อปปิ้ง (ฟรีทุกอย่างในราคาเดียว!)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" class="topping" value="น้ำผึ้ง" checked> น้ำผึ้ง</label>
                    <label class="checkbox-label"><input type="checkbox" class="topping" value="แครกเกอร์" checked> แครกเกอร์</label>
                    <label class="checkbox-label"><input type="checkbox" class="topping" value="กล้วย" checked> กล้วย</label>
                </div>
                <small style="color: #666; margin-top: 5px; display: block;">* ติ๊กเลือกใส่ได้ตามใจชอบเลยค่ะ ราคาเดียวคุ้มๆ!</small>
            </div>

            <div class="form-group">
                <label>จำนวนที่สั่ง (ถ้วย)</label>
                <input type="number" id="quantity" value="1" min="1" oninput="calculatePrice(); updateDeliveryRounds();" required>
            </div>

            <div class="form-group">
                <label>วันที่ต้องการรับสินค้า</label>
                <input type="date" id="delivery-date" onchange="updateDeliveryRounds()" required>
            </div>

            <div class="form-group">
                <label>เลือกรอบส่ง</label>
                <div id="delivery-round-container" class="checkbox-group">
                    <p style="color: #666; margin: 0; font-size: 14px;">กรุณาเลือกวันที่ก่อนค่ะ...</p>
                </div>
            </div>

            <div class="form-group">
                <label>สถานที่จัดส่ง / ช่องทางการติดต่อ</label>
                <textarea id="address" placeholder="สถานที่จัดส่ง.." required></textarea>
            </div>

            <div class="form-group">
                <label>วิธีการชำระเงิน</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="radio" name="payment-method" value="transfer" onchange="updateSubmitButton()" checked> สแกนจ่าย</label>
                    <label class="checkbox-label"><input type="radio" name="payment-method" value="cod" onchange="updateSubmitButton()"> เงินสด</label>
                </div>
            </div>

            <div class="total-price-box">ยอดรวม: <span id="total-price-display">39</span> บาท</div>

            <button type="submit" class="btn-main">ดำเนินการชำระเงิน</button>
        </form>
    </div>

    <div id="payment-page" class="page">
        <button type="button" style="border:none; background:none; color:#0056b3; cursor:pointer; font-family:'Prompt'; margin-bottom: 15px;" onclick="goBackToOrder()">❮ กลับไปแก้ไขออเดอร์</button>
        <h1>ชำระเงิน</h1>

        <div style="text-align: center; margin-bottom: 20px; padding: 20px; background: #fff; border-radius: 15px; border: 1px solid #ddd;">
            <p style="font-size: 18px;">ยอดที่ต้องชำระ</p>
            <p style="font-size: 32px; font-weight: bold; color: #2e7d32; margin-bottom: 15px;"><span id="payment-total-display">0</span>.-</p>
            
            <img src="promptpay.JPG" alt="QR Code" style="max-width: 200px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            <p style="font-size: 14px; color: #666; margin-top: 10px;">สแกนเพื่อชำระเงิน</p>
        </div>

        <div class="form-group">
            <label>แนบหลักฐานการโอนเงิน (สลิป) 🧾</label>
            <input type="file" id="slip-file" accept="image/*" onchange="previewSlip(event)">
            <img id="slip-preview" style="max-width: 100%; margin-top: 15px; display: none; border-radius: 10px; border: 1px solid #ddd;">
        </div>

        <button type="button" id="submit-btn" class="btn-main" onclick="submitOrder(event, 'transfer')">ยืนยันออเดอร์และส่งสลิป</button>
    </div>

</div>

<script>
    // URL Google Sheet ล่าสุดของคุณ
    const scriptUrl = 'https://script.google.com/macros/s/AKfycby6lbhvENJbBE-TlBt5OX4sxOiFPW5gMMRfWXq9bGTnki_6aaX_EEk2ApLrv_yy-aKzlQ/exec';
    let isStockAvailable = true; 
    let shopSchedule = {}; 
    let slipBase64 = ""; 

    function initApp() {
        const loadingScreen = document.getElementById('loading-screen');
        const homePage = document.getElementById('home-page');
        const statusBox = document.getElementById('stock-status');
        const mainOrderBtn = document.getElementById('main-order-btn'); 

        fetch(scriptUrl)
        .then(response => response.json())
        .then(config => {
            isStockAvailable = config.isStockAvailable;
            shopSchedule = config.schedule; 

            if (!isStockAvailable) {
                statusBox.className = 'status-badge sold-out';
                statusBox.innerHTML = '❌ สินค้าหมดชั่วคราว (รอรอบหน้านะคะ)';
                mainOrderBtn.innerText = 'ปิดรับออเดอร์ชั่วคราว';
                mainOrderBtn.disabled = true; 
                mainOrderBtn.style.backgroundColor = '#cccccc'; 
            } else {
                statusBox.className = 'status-badge available';
                statusBox.innerHTML = '✅ วันนี้เปิดร้านนะคะ 🍯✨';
                mainOrderBtn.innerText = 'สั่งเลย 😋';
                mainOrderBtn.disabled = false; 
            }

            loadingScreen.style.display = 'none';
            homePage.classList.add('active');
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ ไม่สามารถโหลดข้อมูลร้านค้าได้');
            loadingScreen.innerHTML = '⚠️ เกิดข้อผิดพลาด';
        });
    }

    initApp();

    // 🚩 ส่วนที่ 2: อัปเดตฟังก์ชันสลับเปลี่ยนจาก <select> มาแสดง Radio buttons รอบส่ง
    function updateDeliveryRounds() {
        const selectedDate = document.getElementById('delivery-date').value; 
        const qtyWanted = parseInt(document.getElementById('quantity').value) || 1;
        const roundContainer = document.getElementById('delivery-round-container');
        
        roundContainer.innerHTML = '<p style="color: #666; margin: 0; font-size: 14px;">⏳ กำลังเช็คโควตา...</p>';

        if (!selectedDate) {
            calculatePrice();
            return;
        }

        const dayConfig = shopSchedule[selectedDate];

        if (dayConfig) {
            if (dayConfig.isFull) {
                roundContainer.innerHTML = '<p style="color: #c62828; margin: 0; font-weight: bold;">❌ สินค้าหมดชั่วคราว</p>';
            } else if (dayConfig.quota > 0 && (dayConfig.booked + qtyWanted) > dayConfig.quota) {
                const remaining = dayConfig.quota - dayConfig.booked;
                roundContainer.innerHTML = `<p style="color: #c62828; margin: 0; font-weight: bold;">❌ รับได้อีกแค่ ${remaining} ถ้วยค่ะ</p>`;
            } else {
                roundContainer.innerHTML = ''; // ล้างค่าเดิม
                let hasRound = false;
                
                if (dayConfig.morning) { 
                    roundContainer.innerHTML += `<label class="checkbox-label"><input type="radio" name="delivery-round" value="รอบเช้า (09:00)" onchange="calculatePrice()" required> รอบเช้า (09:00)</label>`; 
                    hasRound = true; 
                }
                if (dayConfig.afternoon) { 
                    roundContainer.innerHTML += `<label class="checkbox-label"><input type="radio" name="delivery-round" value="รอบบ่าย (13:00)" onchange="calculatePrice()" required> รอบบ่าย (13:00)</label>`; 
                    hasRound = true; 
                }

                // แทรกรอบดึกเข้าไปด้วยเสมอถ้าวันนั้นมีคิวว่าง
                if (hasRound) {
                    roundContainer.innerHTML += `<label class="checkbox-label"><input type="radio" name="delivery-round" value="รอบดึก (หลัง 18:00)" onchange="calculatePrice()" required> รอบดึกหลัง 18.00 (บวกค่าส่ง 10.-)</label>`;
                }

                if (!hasRound) {
                    roundContainer.innerHTML = '<p style="color: #c62828; margin: 0; font-weight: bold;">❌ วันนี้ปิดรับออเดอร์ค่ะ</p>';
                }
            }
        } else {
            roundContainer.innerHTML = '<p style="color: #c62828; margin: 0; font-weight: bold;">❌ ยังไม่เปิดคิวสำหรับวันนี้ค่ะ</p>';
        }
        
        calculatePrice(); // อัปเดตราคาใหม่เผื่อมีการเปลี่ยนวันแล้วตัวเลือกหายไป
    }

    function goToOrder() {
        if (!isStockAvailable) return;
        document.getElementById('home-page').classList.remove('active');
        document.getElementById('order-page').classList.add('active');
        window.scrollTo(0, 0); calculatePrice(); 
    }
    
    function goToHome() {
        document.getElementById('order-page').classList.remove('active');
        document.getElementById('home-page').classList.add('active');
        window.scrollTo(0, 0);
    }

    function updateSubmitButton() {
        const method = document.querySelector('input[name="payment-method"]:checked').value;
        const btn = document.querySelector('#order-form .btn-main');
        if (method === 'cod') {
            btn.innerText = 'ยืนยันออเดอร์ (จ่ายเงินตอนรับของ)';
        } else {
            btn.innerText = 'ดำเนินการชำระเงิน';
        }
    }

    function goToPayment(event) {
        event.preventDefault(); 
        const method = document.querySelector('input[name="payment-method"]:checked').value;

        if (method === 'cod') {
            submitOrder(event, 'cod');
        } else {
            document.getElementById('payment-total-display').innerText = document.getElementById('total-price-display').innerText;
            document.getElementById('order-page').classList.remove('active');
            document.getElementById('payment-page').classList.add('active');
            window.scrollTo(0, 0);
        }
    }

    function goBackToOrder() {
        document.getElementById('payment-page').classList.remove('active');
        document.getElementById('order-page').classList.add('active');
        window.scrollTo(0, 0);
    }
    
    // 🚩 ส่วนที่ 3: อัปเดตการคำนวณราคา ให้เช็คว่าติ๊กรอบดึกไหม ถ้าใช่บวก 10 บาท
    function calculatePrice() {
        let sizePrice = parseInt(document.querySelector('input[name="size"]:checked').value);
        let quantity = parseInt(document.getElementById('quantity').value);
        if (isNaN(quantity) || quantity < 1) quantity = 1; 
        
        let total = sizePrice * quantity;

        // เช็คว่าเลือกรอบดึกไหม
        const selectedRound = document.querySelector('input[name="delivery-round"]:checked');
        if (selectedRound && selectedRound.value.includes("รอบดึก")) {
            total += 10; // บวกค่าจัดส่ง 10 บาท
        }

        // อัปเดตตัวเลขยอดรวมที่แสดงในหน้าจอ
        document.getElementById('total-price-display').innerText = total;
        
        // อัปเดตตัวเลขยอดชำระในหน้า payment (ถ้าอยู่ในหน้านั้น)
        const paymentTotalDisplay = document.getElementById('payment-total-display');
        if (paymentTotalDisplay) {
            paymentTotalDisplay.innerText = total;
        }
    }

    function previewSlip(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewImg = document.getElementById('slip-preview');
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                slipBase64 = e.target.result.split(',')[1]; 
            }
            reader.readAsDataURL(file);
        }
    }

    // 🚩 ส่วนที่ 4: ดึงข้อมูลรอบส่งใหม่จาก Radio buttons ก่อนส่งออเดอร์
    function submitOrder(event, paymentType = 'transfer') {
        event.preventDefault();

        if (paymentType === 'transfer' && !slipBase64) {
            alert('⚠️ กรุณาแนบสลิปการโอนเงินก่อนยืนยันออเดอร์นะคะ');
            return;
        }
        
        let submitBtn;
        if (paymentType === 'cod') {
            submitBtn = document.querySelector('#order-form .btn-main');
            submitBtn.innerText = '⏳ กำลังส่งออเดอร์...';
        } else {
            submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = '⏳ กำลังอัปโหลดสลิปและส่งออเดอร์...';
        }
        submitBtn.disabled = true;

        const toppingBoxes = document.querySelectorAll('.topping');
        let selectedToppings = [];
        toppingBoxes.forEach(box => { if(box.checked) selectedToppings.push(box.value); });
        let toppingsText = (selectedToppings.length > 0) ? selectedToppings.join(', ') : 'ไม่รับท็อปปิ้งเลย';
        
        // ดึงค่ารอบเวลาจาก Radio button ที่ลูกค้าติ๊ก
        const selectedRoundElement = document.querySelector('input[name="delivery-round"]:checked');
        let roundText = selectedRoundElement ? selectedRoundElement.value : 'ไม่ได้เลือกรอบ';

        let selectedSizeVal = document.querySelector('input[name="size"]:checked').value;
        let sizeText = (selectedSizeVal === "39") ? "ไซส์ปกติ (39.-)" : "ไซส์พิเศษ (69.-)";
        
        let paymentText = (paymentType === 'cod') ? "จ่ายเงินตอนรับของ" : "โอนเงิน";

        const orderData = {
            customerName: document.getElementById('customer-name').value,
            texture: sizeText, 
            toppings: toppingsText,
            quantity: document.getElementById('quantity').value,
            totalPrice: document.getElementById('total-price-display').innerText,
            deliveryDate: document.getElementById('delivery-date').value,
            deliveryRound: roundText,
            address: document.getElementById('address').value,
            paymentMethod: paymentText, 
            slipBase64: (paymentType === 'cod') ? "" : slipBase64,
            slipFileName: (paymentType === 'cod') ? "" : "slip_" + document.getElementById('customer-name').value + "_" + new Date().getTime() + ".jpg"
        };

        fetch(scriptUrl, { method: 'POST', body: JSON.stringify(orderData) })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                alert('🎉 สั่งซื้อสำเร็จ! แม่ค้าได้รับออเดอร์แล้วค่ะ');
                location.reload(); 
            } else {
                alert('❌ เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: ' + data.message);
                resetSubmitButton(paymentType, submitBtn);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ มีข้อผิดพลาด! กรุณาลองใหม่อีกครั้ง');
            resetSubmitButton(paymentType, submitBtn);
        });
    }

    function resetSubmitButton(paymentType, btn) {
        if (paymentType === 'cod') {
            btn.innerText = 'ยืนยันออเดอร์ (จ่ายเงินตอนรับของ)';
        } else {
            btn.innerText = 'ยืนยันออเดอร์และส่งสลิป';
        }
        btn.disabled = false;
    }
</script>
