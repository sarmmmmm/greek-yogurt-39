<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านกรีกโยเกิร์ต 39 บาท</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --accent-color: #ffc107;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: var(--card-bg);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .page {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }
        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { text-align: center; color: var(--primary-color); margin-bottom: 10px; font-size: 24px;}
        
        .price-tag {
            text-align: center;
            background-color: var(--accent-color);
            color: #000;
            padding: 10px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .status-badge {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .status-badge.available {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }
        .status-badge.sold-out {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #ef5350;
        }

        .btn-main {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-main:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .btn-back {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 10px; }
        
        .checkbox-group {
            background: var(--bg-color);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eee;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .checkbox-label input {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            accent-color: var(--primary-color);
        }
        .checkbox-label:last-child { margin-bottom: 0; }

        input[type="text"], input[type="date"], input[type="number"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Prompt', sans-serif;
        }
        textarea { resize: none; height: 80px; }

        .divider { height: 1px; background: #ddd; margin: 15px 0; }
        
        .total-price-box {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            border: 2px dashed #4caf50;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-page" class="page active">
        <h1>🍯 ร้านกรีกโยเกิร์ตโฮมเมด</h1>
        <div class="price-tag">
            ราคาเพียง 39 บาท!
        </div>

        <div id="stock-status" class="status-badge available">
            ✅ มีสินค้าพร้อมรับออเดอร์
        </div>

        <img src="image.jpag" alt="Greek Yogurt" style="width: 100%; border-radius: 10px; margin-bottom: 20px;">

        <button id="main-order-btn" class="btn-main" onclick="goToOrder()">สั่งเลย 😋</button>
    </div>

    <div id="order-page" class="page">
        <button class="btn-back" onclick="goToHome()">❮ กลับหน้าหลัก</button>
        <h1>ฟอร์มสั่งซื้อสินค้า</h1>
        
        <form id="order-form" onsubmit="submitOrder(event)">
            
            <div class="form-group">
                <label>ชื่อลูกค้า (ชื่อเล่น / ชื่อที่แม่ค้าจำได้ 💖)</label>
                <input type="text" id="customer-name" placeholder="เช่น สามstd, สามแฟนพี่ไอซ์.." required>
            </div>

            <div class="form-group">
                <label>ระดับความหนึบที่ชอบ</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="radio" name="texture" value="หนึบ" required checked> เนื้อแน่นกำลังดี (สามกดไลค์)
                    </label>
                    <label class="checkbox-label">
                        <input type="radio" name="texture" value="หนึบกว่า"> เนื้อครีมมี่เนียนนุ่ม (หนึบน้อยกว่าจิ้ดนึง)
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>เลือกท็อปปิ้ง (สูงสุด 3 อย่าง)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-all" onchange="toggleAll()" checked> <b>ใส่ทุกอย่าง (39 บาท)</b>
                    </label>
                    <div class="divider"></div>
                    <label class="checkbox-label">
                        <input type="checkbox" class="topping" value="แครกเกอร์" onchange="checkIndividual()" checked> แครกเกอร์
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="topping" value="น้ำผึ้ง" onchange="checkIndividual()" checked> น้ำผึ้ง
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="topping" value="กล้วย" onchange="checkIndividual()" checked> กล้วย
                    </label>
                </div>
                <small style="color: #666; margin-top: 5px; display: block;">* เลือก 2 อย่าง 35.- / เลือก 1 อย่างหรือไม่ใส่เลย 30.-</small>
            </div>

            <div class="form-group">
                <label>จำนวนที่ต้องการสั่ง (ถ้วย)</label>
                <input type="number" id="quantity" value="1" min="1" oninput="calculatePrice()" required>
            </div>

            <div class="total-price-box">
                ยอดรวมต้องชำระ: <span id="total-price-display">39</span> บาท
            </div>

            <div class="form-group">
                <label>วันที่ต้องการรับสินค้า</label>
                <input type="date" id="delivery-date" required>
            </div>

            <div class="form-group">
                <label>เลือกรอบส่ง (เปิด-ปิด ตามที่แม่ค้ากำหนด)</label>
                <select id="delivery-round" required>
                    <option value="" disabled selected>เลือกรอบเวลา...</option>
                </select>
            </div>

            <div class="form-group">
                <label>สถานที่จัดส่ง / ช่องทางการติดต่อ</label>
                <textarea id="address" placeholder="ในมอ หลังมอ..." required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="btn-main">ยืนยันการสั่งซื้อ</button>
        </form>
    </div>

</div>

<script>
    // ==========================================
    // ⚙️ โซนตั้งค่าของแม่ค้า
    // ==========================================
    
    // 1. ตั้งค่าสถานะสินค้า
    const isStockAvailable = true; 

    // 2. ตั้งค่ารอบส่ง
    const shopDeliveryRounds = [
        { value: "morning", text: "รอบเช้า (09:00)", isOpen: true },
        { value: "afternoon", text: "รอบบ่าย (13:00)", isOpen: true }
    ];

    // 🔗 ลิงก์ Google Apps Script สำหรับส่งข้อมูลเข้า Sheets
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwuQJlTukEHMpBYg5Z8hVQYF4tU0qxSNrYM96Hkb2_ErQzbd1O4u80Zbvb90-OxYWs2cg/exec';

    // ==========================================
    // ระบบโหลดข้อมูลเริ่มต้น
    // ==========================================
    function initApp() {
        const statusBox = document.getElementById('stock-status');
        const mainOrderBtn = document.getElementById('main-order-btn');

        if (!isStockAvailable) {
            statusBox.className = 'status-badge sold-out';
            statusBox.innerHTML = '❌ สินค้าหมดชั่วคราว (รอรอบหน้านะคะ)';
            mainOrderBtn.disabled = true;
            mainOrderBtn.innerText = 'ปิดรับออเดอร์';
        }

        const selectBox = document.getElementById('delivery-round');
        shopDeliveryRounds.forEach(round => {
            if (round.isOpen) {
                const option = document.createElement('option');
                option.value = round.value;
                option.innerText = round.text;
                selectBox.appendChild(option);
            }
        });
    }

    initApp();

    // ==========================================
    // ฟังก์ชันการทำงานต่างๆ ของหน้าฟอร์ม
    // ==========================================

    function goToOrder() {
        if (!isStockAvailable) return;
        document.getElementById('home-page').classList.remove('active');
        document.getElementById('order-page').classList.add('active');
        window.scrollTo(0, 0);
        calculatePrice(); 
    }

    function goToHome() {
        document.getElementById('order-page').classList.remove('active');
        document.getElementById('home-page').classList.add('active');
        window.scrollTo(0, 0);
    }

    const checkAllBox = document.getElementById('check-all');
    const toppingBoxes = document.querySelectorAll('.topping');

    function toggleAll() {
        const isChecked = checkAllBox.checked;
        toppingBoxes.forEach(box => {
            box.checked = isChecked;
        });
        calculatePrice();
    }

    function checkIndividual() {
        const allChecked = Array.from(toppingBoxes).every(box => box.checked);
        checkAllBox.checked = allChecked;
        calculatePrice();
    }

    function calculatePrice() {
        let checkedCount = 0;
        toppingBoxes.forEach(box => {
            if(box.checked) checkedCount++;
        });

        let pricePerCup = 30; 
        if (checkedCount === 3) {
            pricePerCup = 39;
        } else if (checkedCount === 2) {
            pricePerCup = 35;
        }

        let quantity = parseInt(document.getElementById('quantity').value);
        if (isNaN(quantity) || quantity < 1) {
            quantity = 1; 
        }

        let totalPrice = pricePerCup * quantity;
        document.getElementById('total-price-display').innerText = totalPrice;
    }

    // ==========================================
    // 🚀 ฟังก์ชันส่งข้อมูลเข้า Google Sheets
    // ==========================================
    function submitOrder(event) {
        event.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรช

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = '⏳ กำลังส่งออเดอร์...';
        submitBtn.disabled = true;

        // ดึงข้อมูลท็อปปิ้งที่เลือก
        let selectedToppings = [];
        toppingBoxes.forEach(box => {
            if(box.checked) selectedToppings.push(box.value);
        });
        let toppingsText = selectedToppings.length > 0 ? selectedToppings.join(', ') : 'ไม่ใส่ท็อปปิ้ง';

        // ดึงข้อความรอบส่ง
        let roundSelect = document.getElementById('delivery-round');
        let roundText = roundSelect.options[roundSelect.selectedIndex].text;

        // จัดเตรียมข้อมูลเป็น JSON
        const orderData = {
            customerName: document.getElementById('customer-name').value,
            texture: document.querySelector('input[name="texture"]:checked').value,
            toppings: toppingsText,
            quantity: document.getElementById('quantity').value,
            totalPrice: document.getElementById('total-price-display').innerText,
            deliveryDate: document.getElementById('delivery-date').value,
            deliveryRound: roundText,
            address: document.getElementById('address').value
        };

        // ยิงข้อมูลไปที่ Google Sheets
        fetch(scriptUrl, {
            method: 'POST',
            body: JSON.stringify(orderData)
        })
        .then(response => {
            alert('🎉 สั่งซื้อสำเร็จ! แม่ค้าได้รับออเดอร์เรียบร้อยแล้วค่ะ');
            
            // รีเซ็ตฟอร์มให้กลับเป็นเหมือนเดิม
            document.getElementById('order-form').reset();
            checkAllBox.checked = true;
            toggleAll();
            submitBtn.innerText = 'ยืนยันการสั่งซื้อ';
            submitBtn.disabled = false;
            
            goToHome(); // เด้งกลับหน้าแรก
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้งค่ะ');
            submitBtn.innerText = 'ยืนยันการสั่งซื้อ';
            submitBtn.disabled = false;
        });
    }
</script>

</body>
</html>
