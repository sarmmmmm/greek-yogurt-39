<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านกรีกโยเกิร์ต 39 บาท</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0056b3; /* สีน้ำเงินหลัก */
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --accent-color: #ffc107;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: var(--card-bg);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .page {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 24px;
        }

        .home-content {
            text-align: center;
            margin-top: 20px;
        }

        /* ส่วนของ Grid รูปภาพ */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .product-item {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #eee;
        }

        .product-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .order-zone {
            margin: 30px 0;
            text-align: center;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .social-icon {
            font-size: 40px;
            text-decoration: none;
            transition: 0.3s;
        }

        .line-icon { color: #00c300; }
        .ig-icon { color: #c13584; }

        .btn-order {
            display: inline-block;
            width: 100%;
            padding: 15px 30px;
            background-color: #1a53ad;
            color: white;
            text-align: center;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn-order:hover {
            background-color: #14448c;
            transform: translateY(-2px);
        }

        .btn-order:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .logo-footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background-color: #f1f8ff;
            border-radius: 15px;
        }

        .logo-footer img {
            max-width: 150px;
            height: auto;
            border-radius: 20px;
        }

        .price-tag {
            text-align: center;
            background-color: var(--accent-color);
            color: #000;
            padding: 10px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .status-badge {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .status-badge.available {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }

        .status-badge.sold-out {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #ef5350;
        }

        .btn-main {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #1a53ad;
            color: white;
            text-align: center;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 10px; }
        .checkbox-group { background: var(--bg-color); padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .checkbox-label { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .checkbox-label input { width: 20px; height: 20px; margin-right: 10px; }
        input[type="text"], input[type="date"], input[type="number"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Prompt', sans-serif; }
        .total-price-box { background-color: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 10px; text-align: center; font-size: 22px; font-weight: 700; border: 2px dashed #4caf50; }
    </style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
    <div style="font-size: 30px; margin-bottom: 10px;">⏳</div>
    <div>กำลังโหลดข้อมูล...</div>
</div>

<div class="container">
    <div id="home-page" class="page">
        <div class="home-content">
            <h1>🍯 ร้านกรีกโยเกิร์ตโฮมเมด</h1>
            <div class="price-tag">ราคาเพียง 39 บาท!</div>

            <div id="stock-status" class="status-badge available">
                ✅ มีสินค้าพร้อมรับออเดอร์
            </div>

            <div class="product-grid">
                <div class="product-item">
                    <img src="product.jpg" alt="สินค้า 1">
                </div>
                <div class="product-item">
                    <img src="product.jpg" alt="สินค้า 2">
                </div>
            </div>

            <div class="order-zone">
                <div class="social-icons">
                    <a href="https://line.me/ti/p/Gvo_Ch9ibR" target="_blank" class="social-icon line-icon"><i class="fab fa-line"></i></a>
                    <a href="https://www.instagram.com/sxrmmm_?igsh=aDNqbHdtOXBzc2lm&utm_source=qr" target="_blank" class="social-icon ig-icon"><i class="fab fa-instagram"></i></a>
                </div>
                <button id="main-order-btn" class="btn-order" onclick="goToOrder()" disabled>
                    กดสั่งซื้อสินค้าตรงนี้ 😋
                </button>
            </div>

            <div class="logo-footer">
                <img src="logo.png" alt="Logo">
                <p style="font-size: 14px; color: #666; margin-top: 10px;">ขอบคุณที่อุดหนุนนะคะ 💖</p>
            </div>
        </div>
    </div>

    <div id="order-page" class="page">
        <button style="border:none; background:none; color:#0056b3; cursor:pointer; font-family:'Prompt';" onclick="goToHome()">❮ กลับหน้าหลัก</button>
        <h1 style="margin-top:10px;">ฟอร์มสั่งซื้อสินค้า</h1>
        <form id="order-form" onsubmit="submitOrder(event)">
            <div class="form-group">
                <label>ชื่อลูกค้า</label>
                <input type="text" id="customer-name" placeholder="ระบุชื่อของคุณ" required>
            </div>
            <div class="form-group">
                <label>จำนวน (ถ้วย)</label>
                <input type="number" id="quantity" value="1" min="1" oninput="calculatePrice()">
            </div>
            <div class="total-price-box">
                ยอดรวม: <span id="total-price-display">39</span> บาท
            </div>
            <button type="submit" id="submit-btn" class="btn-main">ยืนยันการสั่งซื้อ</button>
        </form>
    </div>
</div>

<script>
    // หมายเหตุ: อย่าลืมเปลี่ยน URL เป็นของ Google Script ของคุณเองเพื่อให้ระบบส่งข้อมูลได้จริง
    const scriptUrl = 'YOUR_GOOGLE_SCRIPT_URL';

    function initApp() {
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('home-page').classList.add('active');
            document.getElementById('main-order-btn').disabled = false;
        }, 1000);
    }

    initApp();

    function goToOrder() {
        document.getElementById('home-page').classList.remove('active');
        document.getElementById('order-page').classList.add('active');
        window.scrollTo(0, 0);
    }

    function goToHome() {
        document.getElementById('order-page').classList.remove('active');
        document.getElementById('home-page').classList.add('active');
        window.scrollTo(0, 0);
    }

    function calculatePrice() {
        let qty = document.getElementById('quantity').value;
        document.getElementById('total-price-display').innerText = qty * 39;
    }

    function submitOrder(event) {
        event.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = 'กำลังส่งออเดอร์...';
        btn.disabled = true;

        // ตัวอย่างการแจ้งเตือน (ในอนาคตจะส่งไป Google Sheets)
        setTimeout(() => {
            alert('🎉 ส่งออเดอร์เรียบร้อยแล้วค่ะ!');
            btn.innerText = 'ยืนยันการสั่งซื้อ';
            btn.disabled = false;
            goToHome();
        }, 1500);
    }
</script>

</body>
</html>
